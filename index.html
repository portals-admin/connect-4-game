<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connect 4</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: system-ui, sans-serif;
      color: #fff;
      gap: 24px;
    }

    h1 {
      font-size: 2rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    #status {
      font-size: 1.25rem;
      font-weight: 600;
      min-height: 1.75rem;
      transition: color 0.2s;
    }

    #status.player1 { color: #ef4444; }
    #status.player2 { color: #eab308; }
    #status.draw    { color: #94a3b8; }

    /* Column hover targets sit above the board */
    #col-buttons {
      display: grid;
      grid-template-columns: repeat(7, 72px);
      gap: 6px;
    }

    .col-btn {
      height: 36px;
      background: transparent;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      transition: background 0.15s;
    }

    .col-btn:hover:not(:disabled) { background: rgba(255,255,255,0.1); }
    .col-btn:disabled { cursor: default; }

    .col-btn::after {
      content: "▼";
      font-size: 1rem;
      color: rgba(255,255,255,0.3);
      transition: color 0.15s;
    }

    .col-btn:hover:not(:disabled)::after { color: rgba(255,255,255,0.8); }

    /* Board */
    #board {
      background: #1e40af;
      padding: 10px;
      border-radius: 16px;
      display: grid;
      grid-template-columns: repeat(7, 72px);
      grid-template-rows: repeat(6, 72px);
      gap: 6px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    .cell {
      border-radius: 50%;
      background: #1a1a2e;
      transition: background 0.2s;
      position: relative;
    }

    .cell.p1 { background: #ef4444; }
    .cell.p2 { background: #eab308; }

    /* Win highlight */
    .cell.win {
      box-shadow: 0 0 0 4px #fff inset;
    }

    #new-game {
      padding: 10px 28px;
      font-size: 1rem;
      font-weight: 600;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    #new-game:hover { background: #2563eb; }
    #new-game:active { transform: scale(0.97); }
  </style>
</head>
<body>
  <h1>Connect 4</h1>
  <div id="status"></div>

  <div id="col-buttons"></div>
  <div id="board"></div>

  <button id="new-game">New Game</button>

  <script>
    // ── Game logic (adapted from src/game.ts) ──────────────────────────────
    const ROWS = 6;
    const COLS = 7;
    const WIN_LENGTH = 4;

    function createBoard() {
      return Array.from({ length: ROWS }, () => Array(COLS).fill(null));
    }

    function createGame() {
      return { board: createBoard(), currentPlayer: 1, status: "playing", winner: null };
    }

    function isValidMove(state, col) {
      if (state.status !== "playing") return false;
      if (col < 0 || col >= COLS) return false;
      return state.board[0][col] === null;
    }

    function getDropRow(board, col) {
      for (let row = ROWS - 1; row >= 0; row--) {
        if (board[row][col] === null) return row;
      }
      return -1;
    }

    function checkWin(board, row, col, player) {
      const directions = [[0, 1], [1, 0], [1, 1], [1, -1]];
      for (const [dr, dc] of directions) {
        let count = 1;
        for (let i = 1; i < WIN_LENGTH; i++) {
          const r = row + dr * i, c = col + dc * i;
          if (r < 0 || r >= ROWS || c < 0 || c >= COLS || board[r][c] !== player) break;
          count++;
        }
        for (let i = 1; i < WIN_LENGTH; i++) {
          const r = row - dr * i, c = col - dc * i;
          if (r < 0 || r >= ROWS || c < 0 || c >= COLS || board[r][c] !== player) break;
          count++;
        }
        if (count >= WIN_LENGTH) return true;
      }
      return false;
    }

    function getWinningCells(board, player) {
      const directions = [[0, 1], [1, 0], [1, 1], [1, -1]];
      for (let row = 0; row < ROWS; row++) {
        for (let col = 0; col < COLS; col++) {
          if (board[row][col] !== player) continue;
          for (const [dr, dc] of directions) {
            const cells = [[row, col]];
            for (let i = 1; i < WIN_LENGTH; i++) {
              const r = row + dr * i, c = col + dc * i;
              if (r < 0 || r >= ROWS || c < 0 || c >= COLS || board[r][c] !== player) break;
              cells.push([r, c]);
            }
            if (cells.length === WIN_LENGTH) return cells;
          }
        }
      }
      return [];
    }

    function isDraw(board) {
      return board[0].every(cell => cell !== null);
    }

    function dropPiece(state, col) {
      if (!isValidMove(state, col)) throw new Error(`Invalid move: column ${col}`);
      const board = state.board.map(row => [...row]);
      const row = getDropRow(board, col);
      board[row][col] = state.currentPlayer;

      if (checkWin(board, row, col, state.currentPlayer)) {
        return { board, currentPlayer: state.currentPlayer, status: "won", winner: state.currentPlayer };
      }
      if (isDraw(board)) {
        return { board, currentPlayer: state.currentPlayer, status: "draw", winner: null };
      }
      return { board, currentPlayer: state.currentPlayer === 1 ? 2 : 1, status: "playing", winner: null };
    }

    // ── UI ─────────────────────────────────────────────────────────────────
    let state = createGame();

    const boardEl = document.getElementById("board");
    const colButtonsEl = document.getElementById("col-buttons");
    const statusEl = document.getElementById("status");
    const newGameBtn = document.getElementById("new-game");

    // Build column buttons
    for (let c = 0; c < COLS; c++) {
      const btn = document.createElement("button");
      btn.className = "col-btn";
      btn.dataset.col = c;
      btn.addEventListener("click", () => handleDrop(c));
      colButtonsEl.appendChild(btn);
    }

    // Build cell grid (row 0 = top)
    const cells = [];
    for (let r = 0; r < ROWS; r++) {
      cells[r] = [];
      for (let c = 0; c < COLS; c++) {
        const cell = document.createElement("div");
        cell.className = "cell";
        boardEl.appendChild(cell);
        cells[r][c] = cell;
      }
    }

    function handleDrop(col) {
      if (!isValidMove(state, col)) return;
      state = dropPiece(state, col);
      render();
    }

    function render() {
      // Update cells
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const v = state.board[r][c];
          cells[r][c].className = "cell" + (v === 1 ? " p1" : v === 2 ? " p2" : "");
        }
      }

      // Highlight winning cells
      if (state.status === "won") {
        const winning = getWinningCells(state.board, state.winner);
        for (const [r, c] of winning) {
          cells[r][c].classList.add("win");
        }
      }

      // Update status
      statusEl.className = "";
      if (state.status === "playing") {
        statusEl.textContent = `Player ${state.currentPlayer}'s turn`;
        statusEl.classList.add(`player${state.currentPlayer}`);
      } else if (state.status === "won") {
        statusEl.textContent = `Player ${state.winner} wins!`;
        statusEl.classList.add(`player${state.winner}`);
      } else {
        statusEl.textContent = "It's a draw!";
        statusEl.classList.add("draw");
      }

      // Disable column buttons when game over
      const buttons = colButtonsEl.querySelectorAll(".col-btn");
      buttons.forEach((btn, c) => {
        btn.disabled = !isValidMove(state, c);
      });
    }

    newGameBtn.addEventListener("click", () => {
      state = createGame();
      render();
    });

    // Initial render
    render();
  </script>
</body>
</html>
